databases:
  - name: jobfinder-db
    plan: free
    databaseName: jobfinder
    user: jobfinder

services:
  - type: cron
    name: jobfinder-bot
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jobfinder-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
