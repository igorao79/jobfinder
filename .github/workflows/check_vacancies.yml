name: Check Vacancies

on:
  schedule:
    # Каждые 10 минут
    - cron: "*/10 * * * *"
  workflow_dispatch: # ручной запуск

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: vacancy-check
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore seen IDs cache
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_ids.json
            hh_cookies.json
          key: seen-ids-dummy
          restore-keys: seen-ids-

      - name: Run vacancy checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HH_PHONE: ${{ secrets.HH_PHONE }}
          HH_PASSWORD: ${{ secrets.HH_PASSWORD }}
          AUTO_APPLY_ENABLED: ${{ secrets.AUTO_APPLY_ENABLED }}
        run: python main.py

      - name: Save seen IDs cache
        uses: actions/cache/save@v4
        with:
          path: |
            seen_ids.json
            hh_cookies.json
          key: seen-ids-${{ github.run_id }}
